appId: com.zdhsoft.xmmusic
productName: xmmusic
copyright: Copyright © 2024 zdhsoft

# 不要在交叉编译时重新构建原生模块
buildDependenciesFromSource: false
nodeGypRebuild: false
npmRebuild: false

directories:
  buildResources: build
  output: dist

files:
  - dist/electron/**/*
  - dist/renderer/**/*
  - package.json
  - node_modules/**

asarUnpack:
  - node_modules/@vscode/sqlite3/**/*
  - node_modules/deasync/**/*

publish: never

mac:
  category: public.app-category.music
  icon: build/icon.icns
  target:
    - target: default
      arch:
        - x64
        - arm64
  gatekeeperAssess: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

win:
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64

linux:
  icon: build/icon.png
  target:
    - AppImage
    - deb
    - rpm
